<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Guess the Movie</title>
    <link rel="stylesheet" href="stylesheet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">

    <div class="login-page-container">
        <div class="login-showcase">
            <div class="showcase-icon">🎵</div>
            <h2>Guess the Telugu Movie</h2>
            <p>Your ultimate Telugu movie music challenge.</p>
        </div>

        <div class="login-form-wrapper">
            <h1 class="login-logo">Welcome</h1>
            <p class="login-subtitle">Log in to continue</p>

            <form action="heros.html" class="login-form">
                <input type="text" name="username" class="login-input" placeholder="Username or email">
                <input type="password" name="password" class="login-input" placeholder="Password">
                <button type="submit" class="login-button">Log In</button>
            </form>

            <div class="divider">
                <div class="line"></div>
                <div class="or-text">OR</div>
                <div class="line"></div>
            </div>

            <button class="social-login-button">
                <span>Log in with Facebook</span>
            </button>

            <a href="#" class="forgot-password-link">Forgot password?</a>
            
            <div class="signup-link">
                <p>Don't have an account? <a href="signup.html">Sign up</a></p>
            </div>
        </div>
    </div>

</body>
</html>
