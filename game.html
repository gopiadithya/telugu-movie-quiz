<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess the Telugu Movie</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body class="game-body flex-col">

  <a href="heros.html" class="home-button">🏠</a>

  <div class="text-center">
    <h1 id="main-title" class="page-title text-6xl md:text-7xl font-bold mb-8 mt-8">Guess the Telugu Movie</h1>
  </div>

  <div class="game-container max-w-3xl w-full p-6 rounded-xl shadow-lg text-center flex flex-col items-center">
    <h2 id="hero-title" class="text-2xl font-semibold mb-8">Now playing...</h2>

    <div id="stats-container">
        <div class="stat-item">
            <div class="stat-icon">🎯</div>
            <div class="stat-content">
                <span id="current-score" class="stat-value">0</span>
                <span class="stat-label">Score</span>
            </div>
        </div>
        <div class="stat-item">
            <div class="stat-icon">⏱️</div>
            <div class="stat-content">
                <span id="timer" class="stat-value timer-display">...</span>
                <span class="stat-label">Time Left</span>
            </div>
        </div>
        <div class="stat-item" id="high-score-item">
            <div class="stat-icon">👑</div>
            <div class="stat-content">
                <span id="high-score" class="stat-value">0</span>
                <span class="stat-label">High Score</span>
            </div>
        </div>
    </div>

    <audio id="game-audio" class="mb-6 w-full"></audio>

    <div id="music-animation-container" class="mb-6">
        <div class="record-player">
            <div class="record">
                <div id="record-label" class="record-label"></div>
            </div>
        </div>
    </div>

    <input type="text" id="guess-input" placeholder="Enter movie title..."
           class="guess-input p-3 w-full mb-4">

    <div id="buttons-container" class="space-y-3 w-full">
        <button id="guess-button" class="guess-button p-3 rounded-lg w-full text-lg font-bold">Guess</button>
        <button id="hint-button" class="hint-button p-3 rounded-lg w-full text-lg font-bold">💡 Hint</button>
    </div>

    <div id="hint-text" class="italic my-3"></div>
    <div id="result-message" class="font-bold text-xl mt-4"></div>
  </div>

  <div id="success-overlay" class="success-overlay">
    <div class="success-content">
        <div class="animated-heading correct-message">
            <span class="text-half left">Corr</span><span class="text-half right">ect!</span>
        </div>
        <div class="button-group mt-8 space-y-4 w-full max-w-sm">
            <button id="play-random-hero-button" class="action-button play-random-hero">
                <span class="button-icon">⚡</span> Play Random Hero
            </button>
            <button id="select-another-hero-button" class="action-button select-another-hero">
                <span class="button-icon">⬅️</span> Select Another Hero
            </button>
        </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="game.js"></script>
</body>
</html>
