<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess the Telugu Movie</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body class="bg-[#1a1a2e] text-white flex items-center justify-center min-h-screen p-4">

  <div class="max-w-xl w-full p-6 bg-[#2a2a44] rounded-xl shadow-lg text-center flex flex-col items-center">
    <h1 id="main-title" class="text-4xl font-bold text-orange-500 mb-4">Guess the Telugu Movie</h1>
    <h2 id="hero-title" class="text-2xl font-semibold mb-2">Now playing...</h2>

    <div id="timer-container" class="flex justify-center w-full max-w-sm mx-auto mb-4 text-lg">
        <div>Time: <span id="timer" class="timer-display">...</span></div>
    </div>

    <audio id="game-audio" class="mb-6 w-full"></audio>

    <div id="music-animation-container" class="mb-6">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>


    <input type="text" id="guess-input" placeholder="Enter movie title..."
           class="guess-input p-3 w-full mb-4">

    <div id="buttons-container" class="space-y-3 w-full">
        <button id="guess-button" class="guess-button p-3 rounded-lg w-full text-lg font-bold">Guess</button>
        <button id="hint-button" class="hint-button p-3 rounded-lg w-full text-lg font-bold">💡 Hint</button>
    </div>

    <div id="hint-text" class="italic text-gray-300 my-3"></div>
    <div id="result-message" class="font-bold text-xl mt-4"></div>

    <button id="play-again-button" class="play-again-button hidden p-3 rounded-lg w-full text-lg font-bold mt-4">
      🔄 Choose Another Hero
    </button>

    <a id="back-link" href="index.html" class="block mt-6 text-blue-400 hover:underline">⬅ Back to Heroes</a>
  </div>

  <script src="data.js"></script>
  <script src="game.js"></script>
</body>
</html>
