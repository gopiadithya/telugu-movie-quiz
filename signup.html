<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Guess the Movie</title>
    <link rel="stylesheet" href="stylesheet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">

    <div class="login-page-container">
        <div class="login-showcase">
            <div class="showcase-icon">🎵</div>
            <h2>Guess The Telugu Movie</h2>
            <p>Your ultimate Telugu movie music challenge.</p>
        </div>

        <div class="login-form-wrapper">
            <h1 class="login-logo">Create Account</h1>
            <p class="login-subtitle">Join the challenge!</p>

            <form action="heros.html" class="login-form">
                <input type="text" name="username" class="login-input" placeholder="Username">
                <input type="email" name="email" class="login-input" placeholder="Email">
                <input type="password" name="password" class="login-input" placeholder="Password">
                <button type="submit" class="login-button">Sign Up</button>
            </form>
            
            <div class="signup-link">
                <p>Already have an account? <a href="index.html">Log in</a></p>
            </div>
        </div>
    </div>

</body>
</html>
